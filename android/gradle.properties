org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Force Kotlin to compile inside Gradle instead of spawning a broken separate daemon process
kotlin.compiler.execution.strategy=in-process

# Turn off the cross-drive breaking incremental pathing feature
kotlin.incremental=false

# Give the local process enough memory to compile everything inside one window
org.gradle.jvmargs=-Xmx2048m